<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>校園外送｜菜單</title>
    <link rel="stylesheet" href="../css/base.css" />
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="../index.html">校園外送</a>
      <nav aria-label="主要導覽"><a href="restaurants.html">餐廳</a><a href="cart.html">購物車 <span data-cart-count>0</span></a><a href="../index.html">首頁</a></nav>
    </header>
    <main class="container">
      <section class="page-heading"><p class="eyebrow">本日菜單</p><h1>晴天咖啡</h1><p class="muted">挑選餐點後，按下按鈕加入購物車。</p></section>
      <p class="status-message" data-status-message aria-live="polite"></p>
      <section class="grid">
        <div class="card">
          <h3>特調咖啡</h3>
          <p>濃郁的義式濃縮咖啡搭配香醇牛奶。</p>
          <p class="price">NT$ 120</p>
          <button data-add-to-cart="特調咖啡">加入購物車</button>
        </div>
        <div class="card">
          <h3>鮪魚三明治</h3>
          <p>新鮮鮪魚與清脆生菜，健康無負擔。</p>
          <p class="price">NT$ 80</p>
          <button data-add-to-cart="鮪魚三明治">加入購物車</button>
        </div>
        <div class="card">
          <h3>經典巧克力蛋糕</h3>
          <p>苦甜巧克力製作，口感綿密。</p>
          <p class="price">NT$ 150</p>
          <button data-add-to-cart="經典巧克力蛋糕">加入購物車</button>
        </div>
      </section>
    </main>
    <footer>校園外送小組協作練習</footer><script src="../js/app.js"></script>
  </body>
</html>
