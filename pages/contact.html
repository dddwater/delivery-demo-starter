<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>校園外送｜聯絡我們</title>
    <link rel="stylesheet" href="../css/base.css" />
    <style>
      .contact-grid {
        display: grid;
        grid-template-columns: 1fr 1.5fr;
        gap: 24px;
        margin: 24px 0;
      }
      .info-card {
        background: #ffffff;
        border: 1px solid #d7dee8;
        border-radius: 12px;
        padding: 24px;
        height: fit-content;
      }
      .info-card h3 {
        margin-top: 0;
        margin-bottom: 16px;
        color: #263545;
      }
      .info-list {
        list-style: none;
        padding: 0;
        margin: 0 0 20px 0;
        display: flex;
        flex-direction: column;
        gap: 12px;
        font-size: 14px;
      }
      .info-list li {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      .info-list strong {
        color: #5d6b79;
        font-size: 12px;
        text-transform: uppercase;
      }
      .info-list span {
        color: #263545;
        font-weight: 500;
      }
      .faq-links {
        display: flex;
        flex-direction: column;
        gap: 8px;
        border-top: 1px solid #e2e8f0;
        padding-top: 16px;
      }
      .faq-links a {
        font-size: 14px;
        color: #2e7d61;
        font-weight: 600;
        display: flex;
        align-items: center;
        gap: 4px;
      }
      .faq-links a:hover {
        text-decoration: underline;
      }
      .form-card {
        background: #ffffff;
        border: 1px solid #d7dee8;
        border-radius: 12px;
        padding: 24px;
      }
      .form-card h3 {
        margin-top: 0;
        margin-bottom: 20px;
        color: #263545;
      }
      .form-group {
        margin-bottom: 16px;
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .form-group label {
        font-size: 13px;
        font-weight: bold;
        color: #5d6b79;
      }
      .form-control {
        padding: 10px 12px;
        border: 1px solid #d7dee8;
        border-radius: 6px;
        font-size: 14px;
        color: #263545;
        background: #f7f8fa;
        font-family: inherit;
        transition: border-color 0.2s, background-color 0.2s;
      }
      .form-control:focus {
        outline: none;
        border-color: #2e7d61;
        background: #fff;
      }
      textarea.form-control {
        resize: vertical;
        min-height: 120px;
      }
      .submit-btn {
        width: 100%;
        font-weight: bold;
        font-size: 15px;
        padding: 12px;
        margin-top: 8px;
      }
      .submit-success {
        display: none;
        padding: 12px;
        background: #d4edda;
        color: #155724;
        border: 1px solid #c3e6cb;
        border-radius: 6px;
        font-size: 14px;
        font-weight: 600;
        margin-bottom: 16px;
        text-align: center;
      }
      @media (max-width: 768px) {
        .contact-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="../index.html">校園外送</a>
      <nav aria-label="主要導覽"><a href="profile.html">會員中心</a><a href="../index.html">首頁</a></nav>
    </header>
    <main class="container">
      <section class="page-heading">
        <p class="eyebrow">需要協助嗎？</p>
        <h1>聯絡我們</h1>
        <p class="muted">使用模擬客服資訊，不要填入真實個人資料。</p>
      </section>

      <div class="contact-grid">
        <!-- 客服資訊 -->
        <aside class="info-card">
          <h3>客服管道</h3>
          <ul class="info-list">
            <li>
              <strong>服務時間</strong>
              <span>週一至週日 11:00 – 20:00</span>
            </li>
            <li>
              <strong>電子信箱</strong>
              <span>support@campuseats.edu.tw</span>
            </li>
            <li>
              <strong>客服專線</strong>
              <span>(02) 2345-6789 (僅限服務時間)</span>
            </li>
          </ul>
          
          <div class="faq-links">
            <a href="#">❓ 常見問題：外送遲到怎麼辦？</a>
            <a href="#">❓ 常見問題：如何取消訂單？</a>
            <a href="#">❓ 常見問題：付款失敗處理辦法</a>
          </div>
        </aside>

        <!-- 意見回饋表單 -->
        <section class="form-card">
          <h3>提交意見回饋</h3>
          <div id="successMessage" class="submit-success">✓ 意見已成功提交！客服人員將會盡快與您聯絡。</div>
          <form id="feedbackForm">
            <div class="form-group">
              <label for="userName">您的姓名</label>
              <input type="text" id="userName" class="form-control" placeholder="例如：王大同" required />
            </div>
            <div class="form-group">
              <label for="userEmail">電子信箱</label>
              <input type="email" id="userEmail" class="form-control" placeholder="例如：student@univ.edu.tw" required />
            </div>
            <div class="form-group">
              <label for="category">回饋類別</label>
              <select id="category" class="form-control" required>
                <option value="" disabled selected>請選擇類別</option>
                <option value="delivery">配送問題</option>
                <option value="food">餐點品質</option>
                <option value="system">系統異常</option>
                <option value="other">其他建議</option>
              </select>
            </div>
            <div class="form-group">
              <label for="message">說明您的問題或建議</label>
              <textarea id="message" class="form-control" placeholder="請在此處輸入內容..." required></textarea>
            </div>
            <button type="submit" class="submit-btn">送出回饋</button>
          </form>
        </section>
      </div>
    </main>
    <footer>校園外送小組協作練習</footer>
    <script src="../js/app.js"></script>
    <script>
      document.getElementById('feedbackForm').addEventListener('submit', function(event) {
        event.preventDefault(); // 阻止表單真正送出
        
        // 顯示成功提示
        const successMsg = document.getElementById('successMessage');
        successMsg.style.display = 'block';
        
        // 彈出瀏覽器警告視窗以符合課堂模擬
        window.alert('已收到您的回饋！客服人員將於服務時間內回覆您。');
        
        // 清空表單
        this.reset();
        
        // 5秒後自動隱藏成功提示
        setTimeout(() => {
          successMsg.style.display = 'none';
        }, 5000);
      });
    </script>
  </body>
</html>
